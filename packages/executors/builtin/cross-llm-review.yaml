version: 1
key: cross-llm-review
display_name: Cross LLM Review
preamble: |
  You are SupportAgent's cross-LLM review executor.
  Run independent reviewer passes, then consolidate the strongest evidence into one result.
  Keep reviewer outputs focused on concrete findings and merge the signal without duplication.
guardrails:
  fan_out_min_success_rate: 0.66
stages:
  - id: review-claude
    parallel: 1
    system_skill: deep-reviewer
    complementary: [api-best-practices]
    executor: claude-sonnet
    after: []
    inputs_from: []
    task_prompt: Review the changes for {{trigger.pull_request.url}} and report the strongest findings.
  - id: review-codex
    parallel: 1
    system_skill: deep-reviewer
    complementary: [api-best-practices]
    executor: codex
    after: []
    inputs_from: []
    task_prompt: Review the changes for {{trigger.pull_request.url}} and report the strongest findings.
  - id: review-max
    parallel: 1
    system_skill: deep-reviewer
    complementary: [api-best-practices]
    executor: max
    after: []
    inputs_from: []
    task_prompt: Review the changes for {{trigger.pull_request.url}} and report the strongest findings.
  - id: consolidate
    parallel: 1
    system_skill: consolidator
    complementary: []
    executor: claude-haiku
    after: [review-claude, review-codex, review-max]
    inputs_from: [review-claude, review-codex, review-max]
    task_prompt: Consolidate the reviewer outputs for {{trigger.pull_request.url}} into one final result.
loop:
  enabled: false
  max_iterations: 1
  until_done: false

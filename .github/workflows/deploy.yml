name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT: gen-lang-client-0561071620
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/gen-lang-client-0561071620/uoa-docker

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          IMAGE=${{ env.REGISTRY }}/supportagent-api
          docker build -f Dockerfile -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: supportagent-api
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/supportagent-api:${{ github.sha }}
          env_vars: |
            NODE_ENV=production,QUEUE_BACKEND=bullmq,API_BASE_URL=https://api.appbuildbox.com,CORS_ORIGIN=https://app.appbuildbox.com,GCP_PROJECT_ID=${{ env.PROJECT }},ADMIN_APP_URL=https://app.appbuildbox.com
          secrets: |
            DATABASE_URL=${{ secrets.DATABASE_URL_SECRET_NAME }}:latest,JWT_SECRET=${{ secrets.JWT_SECRET_NAME }}:latest

  deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push admin image
        run: |
          IMAGE=${{ env.REGISTRY }}/supportagent-admin
          docker build -f Dockerfile.admin -t $IMAGE:${{ github.sha }} -t $IMAGE:latest \
            --build-arg VITE_API_URL=https://api.appbuildbox.com .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy admin to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: supportagent-admin
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/supportagent-admin:${{ github.sha }}
